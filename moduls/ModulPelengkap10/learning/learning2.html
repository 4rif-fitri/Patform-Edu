<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="../../../style/global.css">
	<style>
		.content {
			height: calc(100vh - 4rem);
			position: relative;
		}

		.content>.char {
			position: absolute;
			top: 60%;
			left: 25%;
			translate: -50% -50%;
			scale: 10;
			z-index: 1;
		}

		.lantai {
			position: absolute;
			top: 65%;
			left: 50%;
			scale: 6;
		}

		.board
		{
			position: absolute;
			top: 10%;
			left: 50%;
			translate: -50% 0;
			height: calc(16px * 8);
			width: calc(48px * 8);
			z-index: 1;
		}

		.board img
		{
			position: absolute;
			height: 100%;
			width: 100%;
		}

		.board>.text
		{
			position: relative;
			height: 100%;
			width: 100%;
		}

		.board>.text>.row		
		{
			position: absolute;
			z-index: 5;
			width: 100%;
			height: 100%;
		}

		.board3>.text>.row {
			height: 100%;
			width: 100%;
			padding: 0.5rem;
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			place-items: center;
		}

		.board2>.text>.row {
			height: 100%;
			width: 100%;
			padding: 0.5rem;
			display: grid;
			grid-template-columns: repeat(5, 1fr);
			place-items: center;
		}

		.board2>.text>.row>span {
			height: 4rem;
			aspect-ratio: 1 / 1;
			background-color: lightgoldenrodyellow;
			border: 3px dashed black;
		}

		.board>.text>.row>.roww {
			height: 100%;
			width: 100%;
			padding: 0.5rem;
			display: grid;
			grid-template-columns: 2fr 1fr 2fr;
			grid-template-rows: repeat(1, 1fr);
			place-items: center;
		}

		.board>.text>.row>.roww>* {
			background-repeat: no-repeat;
			background-size: contain;
			background-position: center;
		}

		.box {
			width: 100%;
			height: 100%;
			display: grid;
			grid-template-rows: repeat(2, 1fr);
			place-items: center;
		}

		.boxapple {
			width: 100%;
			height: 100%;
			display: grid;
			grid-template-columns: repeat(5, 1fr);
			grid-template-rows: repeat(2, 1fr);
		}

		.apple {
			background-position: center;
			background-repeat: no-repeat;
			background-size: cover;
			background-image: url("../imgs/apple.png");
		}

		.dialog {
			position: absolute;
			top: 42%;
			left: 25%;
			height: calc(20px * 6);
			width: calc(48px * 6);
			z-index: 1;
		}

		.dialog>.text>img {
			position: absolute;
			height: 100%;
			width: 100%;
		}

		.dialog>.text {
			position: relative;
			height: 100%;
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.dialog>.text>h4 {
			position: absolute;
			top: 40%;
			transform: translateY(-50%);
			text-align: center;
		}

		.btn-next {
			all: unset;
			position: absolute;
			bottom: 30px;
			right: 30px;
			padding: 1rem 2rem;
			background-color: yellow;
		}

		.hidden {
			visibility: hidden !important;
		}
		.yellow{
			background-color: yellow;
		}
	</style>
</head>

<body>
	<main>
		<nav>
			<label for="checkbox">
				<img src="../../../imgs/dropdown icon.png" alt="">
			</label>
			<input hidden type="checkbox" name="checkbox" id="checkbox">
			<!-- <img class="logo" src="./imgs/logo.png" alt=""> -->
			<aside>
				<ul>
					<li><a href="../../../index.html">Home</a></li>
					<li><a href="../../../allCourses.html">All Courses</a></li>
					<li><a href="../../../myCourses.html">My Courses</a></li>
				</ul>
			</aside>
		</nav>
		<div class="content">

			<div class="board hidden">
				<div class="text">
					<img src="../imgs/board.png" alt="">
					<div class="row">
						<div class="roww">
							<div class="box box1">
								<h2>9</h2>
								<div class="boxapple">
									<div class="apple"></div>
									<div class="apple"></div>
									<div class="apple"></div>
									<div class="apple"></div>
									<div class="apple"></div>
									<div class="apple"></div>
									<div class="apple"></div>
									<div class="apple"></div>
									<div class="apple"></div>
								</div>
							</div>
							<h1>+</h1>
							<div class="box box2">
								<h2>2</h2>
								<div class="boxapple">
									<div class="apple"></div>
									<div class="apple"></div>

								</div>
							</div>
						</div>
					</div>
				</div>
			</div>

			<img class="char" src="../imgs/ch1.png" alt="">
			<img class="lantai" src="../imgs/StreetBattle.png" alt="">

			<div class="dialog">
				<div class="text">
					<img src="../imgs/dialog.png" alt="">
					<h4>Jom Selesaikan Masalah mengunakan Make 10 strategy</h4>
				</div>
			</div>

			<button id="btnNext" class="btn-next border-3 shadow-4">
				<h3>Next</h3>
			</button>

		</div>

	</main>
	<script src="../script/learning2.js"></script>
</body>

</html>
