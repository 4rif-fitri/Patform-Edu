<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="../../../style/global.css">
	<style>
		.content {
			height: calc(100vh - 4rem);
			position: relative;
		}

		.content>.char {
			position: absolute;
			top: 60%;
			left: 25%;
			translate: -50% -50%;
			scale: 10;
			z-index: 1;
		}

		.lantai {
			position: absolute;
			top: 65%;
			left: 50%;
			scale: 6;
		}

		.board,
		.board2,
		.board3
		{
			position: absolute;
			top: 10%;
			left: 50%;
			translate: -50% 0;
			height: calc(16px * 8);
			width: calc(48px * 8);
			z-index: 1;
		}

		.board img,
		.board2 img, 
		.board3 img 
		{
			position: absolute;
			height: 100%;
			width: 100%;
		}

		.board>.text,
		.board2>.text,
		.board3>.text
		 {
			position: relative;
			height: 100%;
			width: 100%;
		}

		.board>.text>.row,
		.board2>.text>.row,
		.board3>.text>.row
		 {
			position: absolute;
			z-index: 5;
			width: 100%;
			height: 100%;
		}

		.board3>.text>.row {
			height: 100%;
			width: 100%;
			padding: 0.5rem;
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			place-items: center;
		}

		.board2>.text>.row {
			height: 100%;
			width: 100%;
			padding: 0.5rem;
			display: grid;
			grid-template-columns: repeat(5, 1fr);
			place-items: center;
		}

		.board2>.text>.row>span {
			height: 4rem;
			aspect-ratio: 1 / 1;
			background-color: lightgoldenrodyellow;
			border: 3px dashed black;
		}

		.board>.text>.row>.roww {
			height: 100%;
			width: 100%;
			padding: 0.5rem;
			display: grid;
			grid-template-columns: repeat(8, 1fr);
			grid-template-rows: repeat(2, 1fr);
		}

		.board>.text>.row>.roww>* {
			background-repeat: no-repeat;
			background-size: contain;
			background-position: center;
		}

		.satu {
			background-image: url("../imgs/1.png");
		}

		.dua {
			background-image: url("../imgs/2.png");
		}

		.tiga,
		.enam,
		.sebelas,
		.empatBelas,
		.sembilan,
		.duaBelas,
		.limeBelas {
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 2rem;
		}

		.empat {
			background-image: url("../imgs/3.png");
		}

		.lima {
			background-image: url("../imgs/3.png");
		}

		.tujuh {
			background-image: url("../imgs/5.png");
		}

		.lapan {
			background-image: url("../imgs/5.png");
		}

		.sembilan,
		.duaBelas,
		.limeBelas {
			grid-column: span 2;
		}



		.dialog {
			position: absolute;
			top: 42%;
			left: 25%;
			height: calc(20px * 6);
			width: calc(48px * 6);
			z-index: 1;
		}

		.dialog>.text>img {
			position: absolute;
			height: 100%;
			width: 100%;
		}

		.dialog>.text {
			position: relative;
			height: 100%;
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.dialog>.text>h4 {
			position: absolute;
			top: 40%;
			transform: translateY(-50%);
			text-align: center;
		}

		.btn-next {
			all: unset;
			position: absolute;
			bottom: 30px;
			right: 30px;
			padding: 1rem 2rem;
			background-color: yellow;
		}

		.hidden {
			visibility: hidden !important;
		}
	</style>
</head>

<body>
	<main>
		<nav>
			<label for="checkbox">
				<img src="../../../imgs/dropdown icon.png" alt="">
			</label>
			<input hidden type="checkbox" name="checkbox" id="checkbox">
			<!-- <img class="logo" src="./imgs/logo.png" alt=""> -->
			<aside>
				<ul>
					<li><a href="../../../index.html">Home</a></li>
					<li><a href="../../../allCourses.html">All Courses</a></li>
					<li><a href="../../../myCourses.html">My Courses</a></li>
				</ul>
			</aside>
		</nav>
		<div class="content">

			<div class="board hidden">
				<div class="text">
					<img src="../imgs/board.png" alt="">
					<div class="row">
						<div class="roww">
							<div class="satu"></div>
							<div class="dua"></div>
							<div class="tiga">+</div>
							<div class="empat"></div>
							<div class="lima"></div>
							<div class="enam">=</div>
							<div class="tujuh"></div>
							<div class="lapan"></div>

							<div class="sembilan">2</div>
							<div class="sebelas">+</div>
							<div class="duaBelas">3</div>
							<div class="empatBelas">=</div>
							<div class="limeBelas">3</div>
						</div>
					</div>
				</div>
			</div>

			<div class="board2 hidden">
				<div class="text">
					<img src="../imgs/board.png" alt="">
					<div class="row">
						<span></span>
						<!-- <h1>1</h1> -->
						<h1>+</h1>
						<span></span>
						<!-- <h1>1</h1> -->
						<h1>=</h1>
						<h1>10</h1>
					</div>
				</div>
			</div>
			<div class="board3 hidden">
				<div class="text">
					<img src="../imgs/board.png" alt="">
					<div class="row">
						<h1 class="SATU">9</h1>
						<h1>dan</h1>
						<h1 class="DUA">1</h1>
					</div>
				</div>
			</div>

			<img class="char" src="../imgs/ch1.png" alt="">
			<img class="lantai" src="../imgs/StreetBattle.png" alt="">

			<div class="dialog">
				<div class="text">
					<img src="../imgs/dialog.png" alt="">
					<h4>Jom Belajar apa itu pelengkap 10</h4>
				</div>
			</div>

			<button id="btnNext" class="btn-next border-3 shadow-4">
				<h3>Next</h3>
			</button>

		</div>

	</main>
	<script>
		let dialogContainer = document.querySelector(".dialog")
		let dialogText = document.querySelector(".dialog h4")

		let board1 = document.querySelector(".board")
		let board2 = document.querySelector(".board2")
		let board3 = document.querySelector(".board3")

		let btnNext = document.getElementById("btnNext")

		let step = 0

		let tuka = (num1, num2, num3, num4, num5, num6, n1, n2, n3) => {
			document.querySelector(".satu").style.backgroundImage = `url(../imgs/${num1}.png)`
			document.querySelector(".dua").style.backgroundImage = `url(../imgs/${num2}.png)`
			document.querySelector(".empat").style.backgroundImage = `url(../imgs/${num3}.png)`
			document.querySelector(".lima").style.backgroundImage = `url(../imgs/${num4}.png)`
			document.querySelector(".tujuh").style.backgroundImage = `url(../imgs/${num5}.png)`
			document.querySelector(".lapan").style.backgroundImage = `url(../imgs/${num6}.png)`

			document.querySelector(".sembilan").textContent = n1
			document.querySelector(".duaBelas").textContent = n2
			document.querySelector(".limeBelas").textContent = n3
		}

		let tuka3 = (n1,n2) => {
			board3.querySelector(".SATU").textContent = n1
			board3.querySelector(".DUA").textContent = n2
		}



		let nextStep = () => {
			step++

			switch (step) {
				case 1:
					dialogText.textContent = "Pelengkap 10 ialah pasangan dua nombor yang menghasilkan 10 "
					board2.classList.remove("hidden")
					break
				case 2:
					tuka(5, 4, 1, 0, 5, 5, 9, 1, 10)
					board2.classList.add("hidden")
					board1.classList.remove("hidden")
					dialogText.textContent = "sembilan tambah satu same dengan sepuluh"
					break
				case 3:
					tuka(1, 0, 5, 4, 5, 5, 1, 9, 10)
					dialogText.textContent = "begitu juga, satu tambah sembilan same dengan sepuluh "
					break
				case 4:
					board1.classList.add("hidden")
					board3.classList.remove("hidden")
					dialogText.textContent = "Jadi 9 dan 1 adalah pasangan pelengkap 10"
					break
				case 5:
					tuka(5, 3, 2, 0, 5, 5, 8, 2, 10)
					board3.classList.add("hidden")
					board1.classList.remove("hidden")
					dialogText.textContent = "lapan tambah dua same dengan sepuluh"
					break
				case 6:
					tuka(2, 0, 5, 3, 5, 5, 2, 8, 10)
					dialogText.textContent = "begitu juga , dua tambah lapan same dengan sepuluh "
					break
				case 7:
					tuka3(8,2)
					board1.classList.add("hidden")
					board3.classList.remove("hidden")
					dialogText.textContent = "Jadi 8 dan 2 adalah pasangan pelengkap 10"
					break
				case 8:
					tuka(5, 2, 3, 0, 5, 5, 7, 3, 10)
					board3.classList.add("hidden")
					board1.classList.remove("hidden")
					dialogText.textContent = "tujuh tambah tiga same dengan sepuluh "
					break
				case 9:
					tuka(3, 0, 5, 2, 5, 5, 3, 7, 10)
					dialogText.textContent = "begitu juga, tiga tambah tujuh same dengan sepuluh "
					break
				case 10:
					tuka3(7, 3)
					board1.classList.add("hidden")
					board3.classList.remove("hidden")
					dialogText.textContent = "Jadi 7 dan 3 adalah pasangan pelengkap 10"
					break
				case 11:
					tuka(5, 1, 4, 0, 5, 5, 6, 4, 10)
					board3.classList.add("hidden")
					board1.classList.remove("hidden")
					dialogText.textContent = "enam tambah empat same dengan sepuluh"
					break
				case 12:
					tuka(4, 0, 5, 1, 5, 5, 4, 6, 10)
					dialogText.textContent = "begitu juga, empat tambah enam same dengan sepuluh"
					break
				case 13:
					tuka3(6, 4)
					board1.classList.add("hidden")
					board3.classList.remove("hidden")
					dialogText.textContent = "Jadi 6 dan 4 adalah pasangan pelengkap 10"
					break
				case 14:
					board3.classList.add("hidden")
					board1.classList.remove("hidden")
					tuka(5, 0, 5, 0, 5, 5, 5, 5, 10)
					dialogText.textContent = "lima tambah lima same dengan sepuluh"
					break
				case 15:
					tuka3(5, 5)
					board1.classList.add("hidden")
					board3.classList.remove("hidden")
					dialogText.textContent = "Jadi 5 dan 5 adalah pasangan pelengkap 10"
					break
				case 16:
					board3.classList.add("hidden")
					dialogText.textContent = "Itu sahaja Bye"
					break
				case 17:
					window.location.href = "../index.html";
					break
			}

		}

		btnNext.addEventListener("click", nextStep)
	</script>
</body>

</html>
